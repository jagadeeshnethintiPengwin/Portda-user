buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

// Tell RN libraries (gesture-handler, screens, svg, …) where react-native lives
// so they DON'T shell out to `node` during Gradle sync. Android Studio launches
// with a minimal PATH that doesn't include Homebrew's node, which otherwise fails
// with: Cannot run program "node" ... No such file or directory.
ext {
    REACT_NATIVE_NODE_MODULES_DIR = "${rootDir}/../node_modules/react-native"
}

apply plugin: "com.facebook.react.rootproject"
